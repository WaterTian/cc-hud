<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="ui-monospace, 'SF Mono', Menlo, 'Cascadia Mono', Consolas, monospace">
  <title>cc-hud — Claude Code statusline</title>
  <desc>Animated preview of cc-hud: looping context bars, plan-tier badge fade-in, top-model weekly gauge ticker, pulsing agent indicator, ticking rate-limit counter, blinking cursor, shimmering title, and a heartbeat dot. Showcases model · plan tier · context · agents · rate limits · top-model gauge · balance across Claude, GLM, DeepSeek, MiniMax.</desc>

  <defs>
    <linearGradient id="titleBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#181825"/>
      <stop offset="1" stop-color="#11111b"/>
    </linearGradient>
    <filter id="termShadow" x="-10%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.55"/>
    </filter>

    <!-- Per-row bar reveal: width loops 0 → target → hold → 0, every 6s, staggered begin. -->
    <clipPath id="barC"><rect x="296" y="124" width="0" height="18"><animate attributeName="width" values="0;17.3;17.3;0" keyTimes="0;0.22;0.85;1" dur="6s" begin="0.2s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="barG"><rect x="227" y="154" width="0" height="18"><animate attributeName="width" values="0;37.7;37.7;0" keyTimes="0;0.22;0.85;1" dur="6s" begin="0.5s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="barD"><rect x="300" y="184" width="0" height="18"><animate attributeName="width" values="0;18.4;18.4;0" keyTimes="0;0.22;0.85;1" dur="6s" begin="0.8s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="barM"><rect x="254" y="214" width="0" height="18"><animate attributeName="width" values="0;12.0;12.0;0" keyTimes="0;0.22;0.85;1" dur="6s" begin="1.1s" repeatCount="indefinite"/></rect></clipPath>
  </defs>

  <!-- Terminal window -->
  <g filter="url(#termShadow)">
    <rect x="24" y="24" width="852" height="272" rx="14" fill="#1e1e2e" stroke="#313244"/>
    <path d="M24 38 a14 14 0 0 1 14-14 h824 a14 14 0 0 1 14 14 v22 h-852 z" fill="url(#titleBg)"/>
    <line x1="24" y1="60" x2="876" y2="60" stroke="#313244"/>

    <circle cx="44" cy="42" r="6" fill="#f38ba8"/>
    <circle cx="62" cy="42" r="6" fill="#f9e2af"/>
    <circle cx="80" cy="42" r="6" fill="#a6e3a1"/>

    <!-- Title text — `cc-hud` brand color shimmers between purple shades. -->
    <text x="450" y="46" font-size="12" fill="#7f849c" text-anchor="middle" font-weight="500" letter-spacing="0.5"><tspan fill="#cba6f7" font-weight="600">cc-hud<animate attributeName="fill" values="#cba6f7;#e8d4ff;#cba6f7" dur="4s" repeatCount="indefinite"/></tspan> · claude code statusline</text>

    <!-- Heartbeat dot — pulses bright green once per bar cycle, signalling "live". -->
    <circle cx="780" cy="42" r="3" fill="#a6e3a1" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0.6;0" keyTimes="0;0.92;0.95;0.98;1" dur="6s" repeatCount="indefinite"/>
    </circle>

    <rect x="800" y="33" width="60" height="18" rx="9" fill="none" stroke="#313244"/>
    <text x="830" y="46" font-size="10.5" fill="#585b70" text-anchor="middle" letter-spacing="0.7">v0.6.0</text>
  </g>

  <!-- Subtitle + stable-launcher pill -->
  <g>
    <text x="48" y="92" font-size="12" font-style="italic" fill="#585b70">CC-HUD v0.6.0 — <tspan fill="#cba6f7" font-weight="600" font-style="normal">plan tier · top-model</tspan> · context · agents · rate limits · balance</text>
    <rect x="640" y="79" width="116" height="17" rx="4" fill="#b4befe" fill-opacity="0.08" stroke="#b4befe" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.25;0.6;0.25" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="698" y="92" font-size="11" fill="#b4befe" text-anchor="middle" letter-spacing="0.6" font-style="normal">stable launcher</text>
  </g>

  <!-- Body rows -->
  <g font-size="15">

    <!-- Claude (y=138) — the v0.6.0 marquee row: plan-tier badge fades in as the bar
         fills, and the top-model weekly gauge ("Fable:") ticks 49 → 50 → 51. -->
    <text x="48" y="138" fill="#7f849c" font-weight="500">Claude</text>
    <text x="140" y="138"><tspan fill="#6c7086">[</tspan><tspan fill="#89b4fa" font-weight="600">Fable 5</tspan><tspan fill="#6c7086" fill-opacity="0"> · Max5x<animate attributeName="fill-opacity" values="0;0;1;1" keyTimes="0;0.08;0.2;1" dur="6s" begin="0.2s" repeatCount="indefinite"/></tspan><tspan fill="#6c7086">]</tspan></text>
    <text x="296" y="138" fill="#45475a">░░░░░░░░░░</text>
    <text x="296" y="138" fill="#a6e3a1" clip-path="url(#barC)">██████████</text>
    <!-- "18%" rendered invisibly to reserve flow space; overlay ticker (below) paints the visible animated value. -->
    <text x="392" y="138" xml:space="preserve"><tspan fill="#a6e3a1" fill-opacity="0">18%</tspan> <tspan fill="#6c7086">│</tspan> <tspan fill="#6c7086">5h:</tspan><tspan fill="#a6e3a1">1%</tspan> <tspan fill="#6c7086">(</tspan><tspan fill="#b4befe">4.5h</tspan><tspan fill="#6c7086">)</tspan> <tspan fill="#6c7086">│</tspan> <tspan fill="#6c7086">7d:</tspan><tspan fill="#a6e3a1">35%</tspan> <tspan fill="#6c7086">(</tspan><tspan fill="#74c7ec">4.1d</tspan><tspan fill="#6c7086">)</tspan> <tspan fill="#6c7086">│</tspan> <tspan fill="#6c7086">Fable:</tspan><tspan fill="#f9e2af" fill-opacity="0">51%</tspan></text>
    <!-- Claude context % ticker: 0 → 9 → 18 → hold → 9 → 0, synced with Claude bar (begin 0.2s). -->
    <text x="392" y="138" fill="#a6e3a1" xml:space="preserve" opacity="1"> 0%<animate attributeName="opacity" calcMode="discrete" values="1;0;1" keyTimes="0;0.073;0.95" dur="6s" begin="0.2s" repeatCount="indefinite"/></text>
    <text x="392" y="138" fill="#a6e3a1" xml:space="preserve" opacity="0"> 9%<animate attributeName="opacity" calcMode="discrete" values="0;1;0;1;0" keyTimes="0;0.073;0.147;0.90;0.95" dur="6s" begin="0.2s" repeatCount="indefinite"/></text>
    <text x="392" y="138" fill="#a6e3a1" xml:space="preserve" opacity="0">18%<animate attributeName="opacity" calcMode="discrete" values="0;1;0" keyTimes="0;0.147;0.90" dur="6s" begin="0.2s" repeatCount="indefinite"/></text>
    <!-- Top-model weekly gauge ticker: 49 → 50 → 51 over 6s (synced with Claude bar cycle). -->
    <text x="784" y="138" fill="#f9e2af" opacity="1">49%<animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.33;0.34;1" dur="6s" repeatCount="indefinite"/></text>
    <text x="784" y="138" fill="#f9e2af" opacity="0">50%<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.33;0.34;0.66;0.67;1" dur="6s" repeatCount="indefinite"/></text>
    <text x="784" y="138" fill="#f9e2af" opacity="0">51%<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.66;0.67;1" dur="6s" repeatCount="indefinite"/></text>

    <!-- GLM (y=168) -->
    <text x="48" y="168" fill="#7f849c" font-weight="500">GLM</text>
    <text x="140" y="168"><tspan fill="#6c7086">[</tspan><tspan fill="#89b4fa" font-weight="600">GLM 5.2</tspan><tspan fill="#6c7086">]</tspan></text>
    <text x="227" y="168" fill="#45475a">░░░░░░░░░░</text>
    <text x="227" y="168" fill="#a6e3a1" clip-path="url(#barG)">██████████</text>
    <text x="323" y="168" xml:space="preserve"><tspan fill="#a6e3a1" fill-opacity="0">41%</tspan> <tspan fill="#6c7086">(1M)</tspan> <tspan fill="#6c7086">│</tspan> <tspan fill="#94e2d5">◐<animate attributeName="fill-opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite"/></tspan> <tspan fill="#cdd6f4">explore</tspan> <tspan fill="#6c7086">[haiku]</tspan> <tspan fill="#6c7086">│</tspan> <tspan fill="#94e2d5">¥88.50</tspan></text>
    <!-- GLM context % ticker -->
    <text x="323" y="168" fill="#a6e3a1" xml:space="preserve" opacity="1"> 0%<animate attributeName="opacity" calcMode="discrete" values="1;0;1" keyTimes="0;0.073;0.95" dur="6s" begin="0.5s" repeatCount="indefinite"/></text>
    <text x="323" y="168" fill="#a6e3a1" xml:space="preserve" opacity="0">20%<animate attributeName="opacity" calcMode="discrete" values="0;1;0;1;0" keyTimes="0;0.073;0.147;0.90;0.95" dur="6s" begin="0.5s" repeatCount="indefinite"/></text>
    <text x="323" y="168" fill="#a6e3a1" xml:space="preserve" opacity="0">41%<animate attributeName="opacity" calcMode="discrete" values="0;1;0" keyTimes="0;0.147;0.90" dur="6s" begin="0.5s" repeatCount="indefinite"/></text>

    <!-- DeepSeek (y=198) -->
    <text x="48" y="198" fill="#7f849c" font-weight="500">DeepSeek</text>
    <text x="140" y="198"><tspan fill="#6c7086">[</tspan><tspan fill="#89b4fa" font-weight="600">DeepSeek V4 Pro</tspan><tspan fill="#6c7086">]</tspan></text>
    <text x="300" y="198" fill="#45475a">░░░░░░░░░░</text>
    <text x="300" y="198" fill="#a6e3a1" clip-path="url(#barD)">██████████</text>
    <text x="396" y="198" xml:space="preserve"><tspan fill="#a6e3a1" fill-opacity="0">20%</tspan> <tspan fill="#6c7086">(1M)</tspan> <tspan fill="#6c7086">│</tspan> <tspan fill="#94e2d5">¥13.44</tspan></text>
    <!-- DeepSeek context % ticker -->
    <text x="396" y="198" fill="#a6e3a1" xml:space="preserve" opacity="1"> 0%<animate attributeName="opacity" calcMode="discrete" values="1;0;1" keyTimes="0;0.073;0.95" dur="6s" begin="0.8s" repeatCount="indefinite"/></text>
    <text x="396" y="198" fill="#a6e3a1" xml:space="preserve" opacity="0">10%<animate attributeName="opacity" calcMode="discrete" values="0;1;0;1;0" keyTimes="0;0.073;0.147;0.90;0.95" dur="6s" begin="0.8s" repeatCount="indefinite"/></text>
    <text x="396" y="198" fill="#a6e3a1" xml:space="preserve" opacity="0">20%<animate attributeName="opacity" calcMode="discrete" values="0;1;0" keyTimes="0;0.147;0.90" dur="6s" begin="0.8s" repeatCount="indefinite"/></text>

    <!-- MiniMax (y=228) — trailing blinking cursor for terminal feel. -->
    <text x="48" y="228" fill="#7f849c" font-weight="500">MiniMax</text>
    <text x="140" y="228"><tspan fill="#6c7086">[</tspan><tspan fill="#89b4fa" font-weight="600">MiniMax M3</tspan><tspan fill="#6c7086">]</tspan></text>
    <text x="254" y="228" fill="#45475a">░░░░░░░░░░</text>
    <text x="254" y="228" fill="#a6e3a1" clip-path="url(#barM)">██████████</text>
    <text x="350" y="228" xml:space="preserve"><tspan fill="#a6e3a1" fill-opacity="0">13%</tspan> <tspan fill="#6c7086">│</tspan> <tspan fill="#6c7086">5h:</tspan><tspan fill="#a6e3a1">17%</tspan> <tspan fill="#6c7086">(</tspan><tspan fill="#f2cdcd">1.1h</tspan><tspan fill="#6c7086">)</tspan> <tspan fill="#6c7086">│</tspan> <tspan fill="#6c7086">7d:</tspan><tspan fill="#a6e3a1">2%</tspan> <tspan fill="#6c7086">(</tspan><tspan fill="#74c7ec">6.4d</tspan><tspan fill="#6c7086">)</tspan></text>
    <!-- MiniMax context % ticker -->
    <text x="350" y="228" fill="#a6e3a1" xml:space="preserve" opacity="1"> 0%<animate attributeName="opacity" calcMode="discrete" values="1;0;1" keyTimes="0;0.073;0.95" dur="6s" begin="1.1s" repeatCount="indefinite"/></text>
    <text x="350" y="228" fill="#a6e3a1" xml:space="preserve" opacity="0"> 6%<animate attributeName="opacity" calcMode="discrete" values="0;1;0;1;0" keyTimes="0;0.073;0.147;0.90;0.95" dur="6s" begin="1.1s" repeatCount="indefinite"/></text>
    <text x="350" y="228" fill="#a6e3a1" xml:space="preserve" opacity="0">13%<animate attributeName="opacity" calcMode="discrete" values="0;1;0" keyTimes="0;0.147;0.90" dur="6s" begin="1.1s" repeatCount="indefinite"/></text>
    <text x="676" y="228" fill="#cdd6f4">▎<animate attributeName="opacity" values="1;0" keyTimes="0;0.5" calcMode="discrete" dur="1.06s" repeatCount="indefinite"/></text>
  </g>

  <!-- Footer -->
  <g font-size="12" fill="#585b70">
    <line x1="48" y1="256" x2="852" y2="256" stroke="#313244" stroke-dasharray="3 3"/>
    <text x="48" y="278" xml:space="preserve"><tspan fill="#94e2d5">●</tspan> zero dependencies   <tspan fill="#94e2d5">●</tspan> pure Node.js   <tspan fill="#94e2d5">●</tspan> crash-free on Windows   <tspan fill="#94e2d5">●</tspan> 141 tests   <tspan fill="#94e2d5">●</tspan> stable-path launcher</text>
  </g>

</svg>
